<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Original Word Bible — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0a0812;
      --surface:  #13102a;
      --surface2: #1c1838;
      --border:   #2a2550;
      --accent:   #a78bfa;
      --accent2:  #7c3aed;
      --gold:     #f59e0b;
      --text:     #e8e5f5;
      --muted:    #8b85b0;
      --dim:      #4a4570;
      --error:    #f87171;
      --success:  #34d399;
    }
    html, body {
      min-height: 100%; background: var(--bg);
      color: var(--text); font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center;
    }
    .page {
      width: 100%; max-width: 420px;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 20px 40px;
    }

    /* ── Logo ── */
    .logo-wrap {
      text-align: center; margin-bottom: 32px;
    }
    .logo-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--accent2), var(--gold));
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; margin: 0 auto 14px;
      box-shadow: 0 8px 32px rgba(124,58,237,0.4);
    }
    .logo-title {
      font-size: 24px; font-weight: 700; letter-spacing: -0.5px;
    }
    .logo-sub {
      font-size: 13px; color: var(--muted); margin-top: 4px;
    }
    .logo-hebrew {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 18px; color: var(--gold);
      margin-top: 6px; direction: rtl;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    /* ── Tabs ── */
    .auth-tabs {
      display: flex;
      background: var(--surface2);
      border-radius: 10px; padding: 3px;
      margin-bottom: 24px; gap: 3px;
    }
    .auth-tab {
      flex: 1; padding: 9px;
      border: none; background: transparent;
      border-radius: 8px;
      font-size: 13px; font-weight: 600;
      color: var(--muted); cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .auth-tab.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    /* ── Form ── */
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--muted); margin-bottom: 6px;
    }
    .form-input {
      width: 100%; padding: 12px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px; color: var(--text);
      font-family: 'Inter', sans-serif;
      outline: none; transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .form-input::placeholder { color: var(--dim); }
    .form-input:focus { border-color: var(--accent); }

    /* ── Primary Button ── */
    .btn-primary {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--accent2), #6d28d9);
      border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700;
      color: #fff; cursor: pointer;
      font-family: 'Inter', sans-serif;
      margin-top: 6px;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.2px;
    }
    .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 20px 0; color: var(--dim); font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── OAuth Buttons ── */
    .btn-oauth {
      width: 100%; padding: 13px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 14px; font-weight: 600;
      color: var(--text); cursor: pointer;
      font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      margin-bottom: 10px;
    }
    .btn-oauth:hover { background: #252045; border-color: var(--accent); }
    .btn-oauth:active { transform: scale(0.98); }
    .btn-oauth svg { width: 20px; height: 20px; flex-shrink: 0; }

    /* ── Error / Success ── */
    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }
    .alert.error   { background: rgba(248,113,113,0.12); border: 1px solid var(--error); color: var(--error); }
    .alert.success { background: rgba(52,211,153,0.12); border: 1px solid var(--success); color: var(--success); }
    .alert.visible { display: block; }

    /* ── Footer ── */
    .page-footer {
      margin-top: 24px; text-align: center;
      font-size: 11px; color: var(--dim);
    }
  </style>
</head>
<body>
<div class="page">

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-icon">📖</div>
    <div class="logo-title">Original Word Bible</div>
    <div class="logo-sub">Hebrew · Greek · Strong's Lexicon</div>
    <div class="logo-hebrew">בְּרֵאשִׁית · Ἐν ἀρχῇ</div>
  </div>

  <!-- Card -->
  <div class="card">
    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin"  onclick="showTab('login')">Sign In</button>
      <button class="auth-tab"        id="tabSignup" onclick="showTab('signup')">Create Account</button>
    </div>

    <!-- Alert -->
    <div class="alert" id="alertBox"></div>

    <!-- ── Login Form ── -->
    <div id="loginForm">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" id="loginUser" placeholder="Enter username" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password"/>
      </div>
      <button class="btn-primary" onclick="doLogin()">Sign In</button>

      <div class="divider">or continue with</div>

      <a class="btn-oauth" href="https://accounts.google.com/o/oauth2/v2/auth?client_id=YOUR_GOOGLE_CLIENT_ID&redirect_uri=https://yourapp.com/auth/google/callback&response_type=code&scope=email+profile" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign up with Google
      </a>

      <a class="btn-oauth" href="https://appleid.apple.com/auth/authorize?client_id=YOUR_APPLE_CLIENT_ID&redirect_uri=https://yourapp.com/auth/apple/callback&response_type=code+id_token&scope=name+email&response_mode=form_post" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
        Sign up with Apple
      </a>
    </div>

    <!-- ── Signup Form ── -->
    <div id="signupForm" style="display:none;">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" id="signupUser" placeholder="Choose a username" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="signupPass" placeholder="At least 6 characters" autocomplete="new-password"/>
      </div>
      <button class="btn-primary" onclick="doSignup()">Create Account</button>

      <div class="divider">or sign up with</div>

      <a class="btn-oauth" href="https://accounts.google.com/o/oauth2/v2/auth?client_id=YOUR_GOOGLE_CLIENT_ID&redirect_uri=https://yourapp.com/auth/google/callback&response_type=code&scope=email+profile" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign up with Google
      </a>

      <a class="btn-oauth" href="https://appleid.apple.com/auth/authorize?client_id=YOUR_APPLE_CLIENT_ID&redirect_uri=https://yourapp.com/auth/apple/callback&response_type=code+id_token&scope=name+email&response_mode=form_post" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
        Sign up with Apple
      </a>
    </div>
  </div>

  <div class="page-footer">
    Original Word Bible · Strong's Hebrew &amp; Greek Lexicon<br/>
    KJV Bible · 8,674 Hebrew · 5,523 Greek entries
  </div>
</div>

<script>
function showTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('loginForm').style.display  = isLogin ? 'block' : 'none';
  document.getElementById('signupForm').style.display = isLogin ? 'none'  : 'block';
  document.getElementById('tabLogin').classList.toggle('active',  isLogin);
  document.getElementById('tabSignup').classList.toggle('active', !isLogin);
  clearAlert();
}

function showAlert(msg, type='error') {
  const el = document.getElementById('alertBox');
  el.textContent = msg;
  el.className = `alert ${type} visible`;
}

function clearAlert() {
  document.getElementById('alertBox').className = 'alert';
}

function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value.trim();
  if (!username || !password) { showAlert('Please enter username and password.'); return; }

  fetch('/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username, password})
  })
  .then(r => r.json())
  .then(d => {
    if (d.success) {
      showAlert('Welcome back! Loading…', 'success');
      setTimeout(() => window.location.href = d.redirect, 600);
    } else {
      showAlert(d.error || 'Login failed.');
    }
  })
  .catch(() => showAlert('Connection error. Please try again.'));
}

function doSignup() {
  const username = document.getElementById('signupUser').value.trim();
  const email    = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPass').value.trim();
  if (!username || !email || !password) { showAlert('All fields are required.'); return; }

  fetch('/auth/signup', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username, email, password})
  })
  .then(r => r.json())
  .then(d => {
    if (d.success) {
      showAlert('Account created! Welcome!', 'success');
      setTimeout(() => window.location.href = d.redirect, 600);
    } else {
      showAlert(d.error || 'Signup failed.');
    }
  })
  .catch(() => showAlert('Connection error. Please try again.'));
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('loginForm').style.display !== 'none') doLogin();
    else doSignup();
  }
});
</script>
</body>
</html>
